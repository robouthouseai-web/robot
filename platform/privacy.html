<div class="container">

  <p class="date h-lang" data-en="Last updated: May 23, 2026" data-ar="آخر تحديث: 23 مايو 2026"></p>

  <h2 class="h-lang" data-en="1. Information We Collect" data-ar="1. المعلومات التي نجمعها"></h2>
  <p class="h-lang" data-en="We collect information you provide directly, including name, email, phone number, date of birth, health information, medical history, and payment details. We also automatically collect technical information such as IP address, browser type, and usage data." data-ar="نجمع المعلومات التي تقدمها مباشرة، بما في ذلك الاسم والبريد الإلكتروني ورقم الهاتف وتاريخ الميلاد والمعلومات الصحية والتاريخ الطبي وتفاصيل الدفع. نجمع أيضاً معلومات تقنية تلقائياً مثل عنوان IP ونوع المتصفح وبيانات الاستخدام."></p>

  <h2 class="h-lang" data-en="2. How We Use Your Information" data-ar="2. كيف نستخدم معلوماتك"></h2>
  <p class="h-lang" data-en="We use your information to: match you with healthcare providers, process your orders and payments, communicate with you about your care, improve our services, comply with legal obligations, and send marketing communications (with your consent)." data-ar="نستخدم معلوماتك من أجل: مطابقتك مع مقدمي الرعاية الصحية، معالجة طلباتك ومدفوعاتك، التواصل معك بشأن رعايتك، تحسين خدماتنا، الامتثال للالتزامات القانونية، وإرسال الاتصالات التسويقية (بموافقتك)."></p>

  <h2 class="h-lang" data-en="3. HIPAA Compliance" data-ar="3. الامتثال لـ HIPAA"></h2>
  <p class="h-lang" data-en="We are committed to protecting your health information in accordance with HIPAA regulations. Your protected health information (PHI) is encrypted, securely stored, and only shared with authorized healthcare providers as necessary for your treatment." data-ar="نحن ملتزمون بحماية معلوماتك الصحية وفقاً للوائح HIPAA. معلوماتك الصحية المحمية (PHI) مشفرة ومخزنة بشكل آمن ويتم مشاركتها فقط مع مقدمي الرعاية الصحية المصرح لهم حسب الضرورة لعلاجك."></p>

  <h2 class="h-lang" data-en="4. Information Sharing" data-ar="4. مشاركة المعلومات"></h2>
  <p class="h-lang" data-en="We do not sell your personal information. We may share information with: licensed healthcare providers in our network, pharmacies for prescription fulfillment, payment processors for transactions, and as required by law. We use third-party services (analytics, hosting, email) that may process your data under strict confidentiality agreements." data-ar="نحن لا نبيع معلوماتك الشخصية. قد نشارك المعلومات مع: مقدمي الرعاية الصحية المرخصين في شبكتنا، الصيدليات لتنفيذ الوصفات الطبية، معالجي المدفوعات للمعاملات، وحسب ما يقتضيه القانون. نستخدم خدمات طرف ثالث (تحليلات، استضافة، بريد إلكتروني) قد تعالج بياناتك بموجب اتفاقيات سرية صارمة."></p>

  <h2 class="h-lang" data-en="5. Data Security" data-ar="5. أمان البيانات"></h2>
  <p class="h-lang" data-en="We implement industry-standard security measures including SSL/TLS encryption, secure servers, access controls, and regular security audits. However, no method of transmission over the Internet is 100% secure." data-ar="ننفذ تدابير أمان وفقاً لمعايير الصناعة بما في ذلك تشفير SSL/TLS والخوادم الآمنة وضوابط الوصول وعمليات تدقيق أمنية منتظمة. ومع ذلك، لا توجد طريقة نقل عبر الإنترنت آمنة بنسبة 100%."></p>

  <h2 class="h-lang" data-en="6. Your Rights" data-ar="6. حقوقك"></h2>
  <p class="h-lang" data-en="You have the right to: access your personal data, request correction of inaccurate data, request deletion of your data, restrict processing, data portability, and withdraw consent at any time. To exercise these rights, contact us at the email below." data-ar="لديك الحق في: الوصول إلى بياناتك الشخصية، طلب تصحيح البيانات غير الدقيقة، طلب حذف بياناتك، تقييد المعالجة، إمكانية نقل البيانات، وسحب الموافقة في أي وقت. لممارسة هذه الحقوق، اتصل بنا على البريد الإلكتروني أدناه."></p>

  <h2 class="h-lang" data-en="7. Cookies &amp; Tracking" data-ar="7. ملفات تعريف الارتباط والتتبع"></h2>
  <p class="h-lang" data-en="We use cookies and similar tracking technologies to enhance your browsing experience, analyze site traffic, and serve targeted advertisements. You can control cookie preferences through your browser settings. We use TikTok Pixel and Snapchat Pixel for advertising purposes." data-ar="نستخدم ملفات تعريف الارتباط وتقنيات التتبع المشابهة لتعزيز تجربة التصفح الخاصة بك وتحليل حركة المرور على الموقع وتقديم إعلانات مستهدفة. يمكنك التحكم في تفضيلات ملفات تعريف الارتباط من خلال إعدادات المتصفح الخاص بك. نستخدم TikTok Pixel و Snapchat Pixel لأغراض إعلانية."></p>

  <h2 class="h-lang" data-en="8. Third-Party Links" data-ar="8. روابط الطرف الثالث"></h2>
  <p class="h-lang" data-en="Our website may contain links to third-party websites. We are not responsible for the privacy practices or content of these sites. We encourage you to review their privacy policies before providing any personal information." data-ar="قد يحتوي موقعنا على روابط لمواقع طرف ثالث. نحن لسنا مسؤولين عن ممارسات الخصوصية أو محتوى هذه المواقع. نشجعك على مراجعة سياسات الخصوصية الخاصة بهم قبل تقديم أي معلومات شخصية."></p>

  <h2 class="h-lang" data-en="9. Children's Privacy" data-ar="9. خصوصية الأطفال"></h2>
  <p class="h-lang" data-en="Our services are not intended for individuals under 18 years of age. We do not knowingly collect personal information from minors. If we become aware that a minor has provided us with personal data, we will take steps to delete it." data-ar="خدماتنا ليست مخصصة للأفراد الذين تقل أعمارهم عن 18 عاماً. نحن لا نجمع معلومات شخصية من القاصرين عن قصد. إذا علمنا أن قاصراً قد قدم لنا بيانات شخصية، فسنتخذ خطوات لحذفها."></p>

  <h2 class="h-lang" data-en="10. Changes to This Policy" data-ar="10. التغييرات في هذه السياسة"></h2>
  <p class="h-lang" data-en="We may update this Privacy Policy from time to time. Material changes will be notified via email or prominent notice on our website. Your continued use after changes constitutes acceptance." data-ar="قد نقوم بتحديث سياسة الخصوصية هذه من وقت لآخر. سيتم الإعلان عن التغييرات الجوهرية عبر البريد الإلكتروني أو إشعار بارز على موقعنا. استمرار استخدامك بعد التغييرات يشكل قبولاً."></p>

  <h2 class="h-lang" data-en="11. Contact" data-ar="11. الاتصال"></h2>
  <p class="h-lang" data-en="For privacy-related inquiries, please contact us:" data-ar="للاستفسارات المتعلقة بالخصوصية، يرجى الاتصال بنا:"></p>
  <p>
    📧 <a href="mailto:robouthouseai@gmail.com" style="color:#059669">robouthouseai@gmail.com</a><br>
    📞 +971567952199<br>
    📍 131 Continental Dr. Ste 305, Newark, DE 19713
  </p>
</div>
<script>
let LANG='en';
function setLang(l){
  LANG=l;
  document.getElementById('langEnBtn').className=l==='en'?'active':'';
  document.getElementById('langArBtn').className=l==='ar'?'active':'';
  document.querySelectorAll('.h-lang').forEach(el=>{if(el.dataset[l])el.innerHTML=el.dataset[l];});
  document.querySelectorAll('[data-lang]').forEach(el=>{el.hidden=el.dataset.lang!==l});
  document.documentElement.lang=l;
  document.documentElement.dir=l==='ar'?'rtl':'ltr';
  document.querySelector('.back').innerHTML=l==='ar'?'→ العودة للرئيسية':'← Back to Home';
}
setLang('en');
</script>
</body>
</html>
