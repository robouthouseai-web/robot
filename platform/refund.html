<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refund & Cancellation Policy — ROBOT HOUSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Red Hat Text',sans-serif;color:#242220;line-height:1.8;background:#fafaf9}
.container{max-width:860px;margin:0 auto;padding:24px}
.header{background:#fff;border-bottom:1px solid #f0efef;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.header .brand{font-weight:800;font-size:1.1em;color:#242220}
.header .brand span{color:#059669}
.header .back{color:#059669;text-decoration:none;font-weight:600;font-size:0.9em}
h1{font-size:2em;font-weight:800;margin:40px 0 8px;letter-spacing:-0.5px}
.date{color:#78716c;font-size:0.85em;margin-bottom:32px}
h2{font-size:1.2em;font-weight:700;margin:32px 0 12px;color:#242220}
p{margin-bottom:16px;color:#57534e;font-size:0.92em}
ul{margin:0 0 16px 24px}
ul li{margin-bottom:8px;color:#57534e;font-size:0.92em}
.lang-bar{display:flex;gap:8px}
.lang-bar button{background:0;border:1px solid #e0ddda;color:#242220;padding:4px 14px;border-radius:100px;cursor:pointer;font-size:0.82em;font-family:inherit}
.lang-bar button.active{background:#059669;border-color:#059669;color:#fff}
</style>
</head>
<body>
<div class="header">
  <div class="brand"><span>ROBOT</span> HOUSE</div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="lang-bar">
      <button id="langEnBtn" class="active" onclick="setLang('en')">EN</button>
      <button id="langArBtn" onclick="setLang('ar')">عربي</button>
    </div>
    <a href="GLP.html" class="back" data-en="← Back to Home" data-ar="→ العودة للرئيسية"></a>
  </div>
</div>
<div class="container">
  <h1 class="h-lang" data-en="Refund &amp; Cancellation Policy" data-ar="سياسة الاسترداد والإلغاء"></h1>
  <p class="date h-lang" data-en="Last updated: May 23, 2026" data-ar="آخر تحديث: 23 مايو 2026"></p>

  <h2 class="h-lang" data-en="1. Medical Consultation Fees" data-ar="1. رسوم الاستشارة الطبية"></h2>
  <p class="h-lang" data-en="Consultation fees paid to healthcare providers are generally non-refundable once the consultation has been scheduled or conducted. If you need to cancel or reschedule, please contact us at least 24 hours before your appointment to avoid being charged." data-ar="رسوم الاستشارة المدفوعة لمقدمي الرعاية الصحية غير قابلة للاسترداد بشكل عام بمجرد جدولة الاستشارة أو إجرائها. إذا كنت بحاجة إلى الإلغاء أو إعادة الجدولة، يرجى الاتصال بنا قبل 24 ساعة على الأقل من موعدك لتجنب الرسوم."></p>

  <h2 class="h-lang" data-en="2. Medication &amp; Product Orders" data-ar="2. طلبات الأدوية والمنتجات"></h2>
  <p class="h-lang" data-en="Once an order for medication or wellness products has been placed and processed, it cannot be cancelled. Refunds for unopened, unused products may be considered on a case-by-case basis within 14 days of delivery. Shipping and handling fees are non-refundable." data-ar="بمجرد تقديم طلب الأدوية أو منتجات العافية ومعالجته، لا يمكن إلغاؤه. قد يتم النظر في استرداد الأموال للمنتجات غير المفتوحة وغير المستخدمة على أساس كل حالة على حدة في غضون 14 يوماً من التسليم. رسوم الشحن والمناولة غير قابلة للاسترداد."></p>

  <h2 class="h-lang" data-en="3. Subscription Plans" data-ar="3. الخطط الاشتراكية"></h2>
  <p class="h-lang" data-en="Monthly subscription plans can be cancelled at any time. Upon cancellation, you will continue to have access to your plan benefits until the end of the current billing period. No partial refunds are given for the remaining days in a billing period." data-ar="يمكن إلغاء الخطط الاشتراكية الشهرية في أي وقت. عند الإلغاء، ستستمر في الحصول على مزايا خطتك حتى نهاية فترة الفوترة الحالية. لا يتم تقديم استرداد جزئي للأيام المتبقية في فترة الفوترة."></p>

  <h2 class="h-lang" data-en="4. Membership Freeze" data-ar="4. تجميد العضوية"></h2>
  <p class="h-lang" data-en="You may request to freeze your membership for up to 3 months. During this period, you will not be charged, and your benefits will be paused. To unfreeze, simply contact us and your membership will be reactivated." data-ar="يمكنك طلب تجميد عضويتك لمدة تصل إلى 3 أشهر. خلال هذه الفترة، لن تتم محاسبتك، وسيتم إيقاف مزاياك مؤقتاً. لإلغاء التجميد، ما عليك سوى الاتصال بنا وسيتم إعادة تنشيط عضويتك."></p>

  <h2 class="h-lang" data-en="5. Meal Plan Subscriptions" data-ar="5. اشتراكات خطط الوجبات"></h2>
  <p class="h-lang" data-en="Meal plan subscriptions must be cancelled at least 7 days before the next billing cycle to avoid charges. Orders that have already been prepared or shipped cannot be cancelled or refunded." data-ar="يجب إلغاء اشتراكات خطط الوجبات قبل 7 أيام على الأقل من دورة الفوترة التالية لتجنب الرسوم. الطلبات التي تم تحضيرها أو شحنها بالفعل لا يمكن إلغاؤها أو استرداد قيمتها."></p>

  <h2 class="h-lang" data-en="6. How to Request a Refund" data-ar="6. كيفية طلب استرداد"></h2>
  <p class="h-lang" data-en="To request a refund or cancellation, please contact our support team at robouthouseai@gmail.com with your order/reference number and reason for the request. We will review and respond within 5-7 business days." data-ar="لطلب استرداد أو إلغاء، يرجى الاتصال بفريق الدعم لدينا على robouthouseai@gmail.com مع رقم طلبك/مرجعك وسبب الطلب. سنقوم بالمراجعة والرد في غضون 5-7 أيام عمل."></p>

  <h2 class="h-lang" data-en="7. Chargebacks" data-ar="7. الاعتراض على المدفوعات"></h2>
  <p class="h-lang" data-en="If you believe a charge is incorrect, please contact us first before initiating a chargeback with your bank. We are committed to resolving billing disputes fairly and promptly." data-ar="إذا كنت تعتقد أن هناك رسماً غير صحيح، يرجى الاتصال بنا أولاً قبل بدء اعتراض على الدفع مع البنك الذي تتعامل معه. نحن ملتزمون بحل نزاعات الفوترة بشكل عادل وسريع."></p>

  <h2 class="h-lang" data-en="8. Contact" data-ar="8. الاتصال"></h2>
  <p class="h-lang" data-en="For all refund and cancellation inquiries:" data-ar="لجميع استفسارات الاسترداد والإلغاء:"></p>
  <p>
    📧 <a href="mailto:robouthouseai@gmail.com" style="color:#059669">robouthouseai@gmail.com</a><br>
    📞 +971567952199<br>
    📍 131 Continental Dr. Ste 305, Newark, DE 19713
  </p>
</div>
<script>
let LANG='en';
function setLang(l){
  LANG=l;
  document.getElementById('langEnBtn').className=l==='en'?'active':'';
  document.getElementById('langArBtn').className=l==='ar'?'active':'';
  document.querySelectorAll('.h-lang').forEach(el=>{if(el.dataset[l])el.innerHTML=el.dataset[l];});
  document.querySelectorAll('[data-lang]').forEach(el=>{el.hidden=el.dataset.lang!==l});
  document.documentElement.lang=l;
  document.documentElement.dir=l==='ar'?'rtl':'ltr';
  document.querySelector('.back').innerHTML=l==='ar'?'→ العودة للرئيسية':'← Back to Home';
}
setLang('en');
</script>
</body>
</html>
